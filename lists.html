<!DOCTYPE html>
<html>
    <head>
        <title>Lists
            
        </title>
    </head>
    <body>
        <h2>An ordered HTML lists: </h2>
        <ol>
            <li>First item</li>
            <li>second item</li>
            <li>third item</li>

        </ol>
        <h2>an unordered list</h2>
        <ul>
            <li>First item</li>
            <li>second item</li>
            <li>third item</li>

        </ul>
        <dl>
            <dt>tea</dt>
            <dd>-hot drink</dd>
            <dt>juice</dt>
            <dd>-ice cream</dd>
            

        </dl>
    </body>
    

</html>
